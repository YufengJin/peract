services:
  peract:
    container_name: peract_container
    image: ${IMAGE:-peract:latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile
    network_mode: host
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ${HOME}/.Xauthority:/root/.Xauthority:ro
      - ../:/workspace
      - ${COPPELIASIM_ROOT:-../third_party/CoppeliaSim}:/coppeliasim
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    working_dir: /workspace
    stdin_open: true
    tty: true
    environment:
      - DISPLAY=${DISPLAY}
      - XAUTHORITY=/root/.Xauthority
      - COPPELIASIM_ROOT=/coppeliasim
      - LD_LIBRARY_PATH=/coppeliasim
      - QT_QPA_PLATFORM_PLUGIN_PATH=/coppeliasim
      - XDG_RUNTIME_DIR=/tmp/runtime-root
      - NVIDIA_VISIBLE_DEVICES=${GPU:-all}
      - NVIDIA_DRIVER_CAPABILITIES=all
    ulimits:
      memlock: -1
    command: tail -f /dev/null
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
